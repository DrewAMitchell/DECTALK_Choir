# Different voice options [:np] [:nb] [:nh] [:nd] [:nf] [:nu] [:nr] [:nw] [:nk]

# How much to shift pitches by (DECTALK Pitches not the same as midi, should be 48 off or so)
noteOffset: -60

# Words are broken up into phonemes, the playback lengths of which must be specified in code
# This is calculated by setting a standard fraction of each word to dedicate to consonants
# Also specify min and max length in milliseconds for each consonant to prevent weird issues
consonantFractionTarget: 0.15
consonantMinMs: 5
consonantMaxMs: 75

# Give very short articulations more pronunciation time without moving later note onsets.
minimumNoteDurationMs: 200

# Set Specific settings for each track
# Make sure each track is listed here, included in the MIDI file, and has a .txt file in lyrics all with the same title
Tracks:
  Soprano:
    DEC_SETUP: "[:nf][:dv hs 90]"
    VOLUME_ADJUST_DB: 5
    OCTAVE_BOOST: 2

    PITCH_SHIFT: 0
    PITCH_WRAP_SHIFT: null
    IGNORE_MIDI_VELOCITY: true
    VELOCITY_VOLUME_SCALE_DB: 0
    STEM_PEAK_CEILING_DBFS: -3
    GAP_MEND_MS: 0
    SPECTROGRAM:
      COLOR_HSB: [328, 70, 97]
      POSITION: [0.5, 0, 0]
      LABEL: "Soprano"
      LABEL_ENABLED: true
      LABEL_POSITION: "top-left"
      LABEL_SHOW_VOICE: true
      LABEL_SHOW_HEAD_SIZE: true
      LABEL_FONT: "serif"
      LABEL_FONT_SIZE_PERCENT: 7
      CURRENT_WORD_ENABLED: true
      CURRENT_WORD_POSITION: "bottom-center"
      CURRENT_WORD_FONT: "mono"
      CURRENT_WORD_FONT_SIZE_PERCENT: 10
      CURRENT_WORD_USE_TRACK_COLOR: false
  Alto:
    DEC_SETUP: "[:nk][:dv hs 100]"
    VOLUME_ADJUST_DB: -2

    PITCH_SHIFT: 0
    OCTAVE_BOOST: 0
    PITCH_WRAP_SHIFT: null
    IGNORE_MIDI_VELOCITY: True
    VELOCITY_VOLUME_SCALE_DB: 0
    STEM_PEAK_CEILING_DBFS: -4
    GAP_MEND_MS: 0
    SPECTROGRAM:
      COLOR_HSB: [154, 27, 79]
      POSITION: [0.5, 0.5, 0]
      LABEL: "Alto"
      LABEL_ENABLED: true
      LABEL_POSITION: "top-left"
      LABEL_SHOW_VOICE: true
      LABEL_SHOW_HEAD_SIZE: true
      LABEL_FONT: "serif"
      LABEL_FONT_SIZE_PERCENT: 7
      CURRENT_WORD_ENABLED: true
      CURRENT_WORD_POSITION: "bottom-center"
      CURRENT_WORD_FONT: "mono"
      CURRENT_WORD_FONT_SIZE_PERCENT: 10
      CURRENT_WORD_USE_TRACK_COLOR: false

  Tenor:
    DEC_SETUP: "[:np][:dv hs 110]"
    VOLUME_ADJUST_DB: -8

    PITCH_SHIFT: 0
    OCTAVE_BOOST: 0
    PITCH_WRAP_SHIFT: null
    IGNORE_MIDI_VELOCITY: True
    VELOCITY_VOLUME_SCALE_DB: 0
    STEM_PEAK_CEILING_DBFS: -1
    GAP_MEND_MS: 0
    SPECTROGRAM:
      COLOR_HSB: [210, 49, 100]
      POSITION: [0.5, 0, 0.5]
      LABEL: "Tenor"
      LABEL_ENABLED: true
      LABEL_POSITION: "top-left"
      LABEL_SHOW_VOICE: true
      LABEL_SHOW_HEAD_SIZE: true
      LABEL_FONT: "serif"
      LABEL_FONT_SIZE_PERCENT: 7
      CURRENT_WORD_ENABLED: true
      CURRENT_WORD_POSITION: "bottom-center"
      CURRENT_WORD_FONT: "mono"
      CURRENT_WORD_FONT_SIZE_PERCENT: 10
      CURRENT_WORD_USE_TRACK_COLOR: false

  Bass:
    DEC_SETUP: "[:np][:dv hs 130]"
    VOLUME_ADJUST_DB: -8
    OCTAVE_BOOST: 0
    PITCH_SHIFT: 0
    PITCH_WRAP_SHIFT: null
    IGNORE_MIDI_VELOCITY: True
    VELOCITY_VOLUME_SCALE_DB: 0
    STEM_PEAK_CEILING_DBFS: -1
    GAP_MEND_MS: 0
    SPECTROGRAM:
      COLOR_HSB: [258, 33, 47]
      POSITION: [0.5, 0.5, 0.5]
      LABEL: "Bass"
      LABEL_ENABLED: true
      LABEL_POSITION: "top-left"
      LABEL_SHOW_VOICE: true
      LABEL_SHOW_HEAD_SIZE: true
      LABEL_FONT: "serif"
      LABEL_FONT_SIZE_PERCENT: 7
      CURRENT_WORD_ENABLED: true
      CURRENT_WORD_POSITION: "bottom-center"
      CURRENT_WORD_FONT: "mono"
      CURRENT_WORD_FONT_SIZE_PERCENT: 10
      CURRENT_WORD_USE_TRACK_COLOR: false
