# Different voice options [:np] [:nb] [:nh] [:nd] [:nf] [:nu] [:nr] [:nw] [:nk]

# DECtalk pitch offset from MIDI. The Singer track is in a normal vocal range.
noteOffset: -48

# Words are broken up into phonemes, the playback lengths of which must be specified in code.
consonantFractionTarget: 0.20
consonantMinMs: 5
consonantMaxMs: 90

# Fold tiny MIDI transcription gaps into the previous note.
gapMendMs: 20

Tracks:
  Singer Bass:
    LYRICS_FILENAME: "Singer Bass"
    DEC_SETUP: "[:np][:dv hs 100]"
    VOLUME_ADJUST_DB: 0
    SPECTROGRAM:
      COLOR_HSB: [316, 90, 100]
      POSITION: [0.5, 0, 0.5]
      LABEL: "Singer Bass"
      LABEL_ENABLED: true
      LABEL_POSITION: "top-left"
      LABEL_SHOW_VOICE: true
      LABEL_SHOW_HEAD_SIZE: true
      LABEL_FONT: "serif"
      LABEL_FONT_SIZE_PERCENT: 7
      CURRENT_WORD_ENABLED: true
      CURRENT_WORD_POSITION: "bottom-center"
      CURRENT_WORD_FONT: "mono"
      CURRENT_WORD_FONT_SIZE_PERCENT: 10
      CURRENT_WORD_USE_TRACK_COLOR: true

    RENDER_ENABLED: True
    PITCH_SHIFT: 0
    OCTAVE_BOOST: 0
    PITCH_WRAP_SHIFT: null
    IGNORE_MIDI_VELOCITY: true
    VELOCITY_VOLUME_SCALE_DB: 0
    STEM_PEAK_CEILING_DBFS: -4
    GAP_MEND_MS: 20
    MINIMUM_NOTE_DURATION_MS: 0
    CODA_MAX_MS: 200
